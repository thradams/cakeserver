<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
			<title>File Browser</title>
			<style>
				body { font-family: sans-serif; margin: 20px; }

				.toolbar {
				display: flex;
				gap: 10px;
				align-items: center;
				}

				#fileList {
				min-width: 250px;
				}

				textarea {
				width: 100%;
				height: 300px;
				margin-top: 20px;
				}

				#output {
				background: #1e1e1e;
				color: #d4d4d4;
				padding: 12px;
				border-radius: 4px;
				font-family: monospace;
				font-size: 13px;
				overflow-x: auto;
				white-space: pre-wrap;
				min-height: 60px;
				}

				
			</style>
		</head>
	<body>

		<div class="toolbar">
			<input id="pathInput" placeholder="relative path" size="30"/>
				<button onclick="loadFiles()">Load</button>

				<select id="fileList" onchange="onFileSelect()">
					<option value="">-- files --</option>
				</select>

				<!-- ✅ Save moved to top -->
				<button onclick="saveFile()" id="saveBtn" disabled="">Save</button>
				<button onclick="saveCompile()" id="saveCompileBtn">Save &amp; Compile</button>
			</div>

		 <div >

      <div class="gutter" id="gutter"></div>

      <div class="editor-view">
        <pre id="highlight" class="highlight"></pre>

        <!-- ONLY THIS TEXTAREA IS THE EDITOR -->
        <textarea id="c-editor"></textarea>
      </div>

    </div>

    <div>
      <div class="output-title">Output</div>
      <pre id="output" class="output"></pre>
    </div>

    
	
		<script src="main.js"></script>

		
	</body>
</html>
