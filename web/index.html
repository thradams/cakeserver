<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Browser</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 8px 12px;
            padding-top: 44px; /* height of fixed toolbar */
        }

        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 4px 12px;
            background: #f5f5f5;
            border-bottom: 1px solid #ccc;
            height: 36px;
            box-sizing: border-box;
        }

            .toolbar input, .toolbar select, .toolbar button {
                font-size: 12px;
                padding: 2px 6px;
                height: 24px;
                box-sizing: border-box;
            }

            .toolbar button {
                cursor: pointer;
            }

        #fileList {
            min-width: 160px;
            max-width: 260px;
        }


        #output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            overflow-x: auto;
            overflow-y: auto;
            white-space: pre;
            min-height: 60px;
            max-height: 200px;
            margin: 0;
            line-height: 1.4;
        }



        .output-line {
            display: block;
        }

        .output-diag {
            display: block;
            cursor: pointer;
            border-left: 3px solid transparent;
            padding-left: 4px;
            margin-left: -4px;
        }

            .output-diag:hover {
                background: rgba(255,255,255,0.05);
                border-left-color: #555;
            }

            .output-diag.selected {
                background: rgba(86, 156, 214, 0.15);
                border-left-color: #569cd6;
            }

        .editor-wrap {
            display: flex;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0;
        }

        #gutter {
            background: #1e1e1e;
            border-right: 1px solid #333;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            width: 48px;
        }

        #gutter-inner {
            position: absolute;
            top: 0;
            right: 0;
            padding: 10px 8px 10px 4px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
            color: #6e7681;
            text-align: right;
            white-space: pre;
            user-select: none;
        }

        .editor-view {
            position: relative;
            height: 300px;
            flex: 1;
        }

        /* BOTH must match exactly */
        .highlight,
        #c-editor {
            color: transparent; /* hide text */
            caret-color: white; /* keep cursor visible */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre;
            overflow: auto;
            box-sizing: border-box;
        }

        /* background layer - scrollable, scrollbar visible */
        .highlight {
            background: #1e1e1e;
            color: #d4d4d4;
            pointer-events: none;
            z-index: 1;
            overflow: auto;
        }

        /* typing layer - on top, but right edge cut so highlight scrollbar shows */
        #c-editor {
            background: transparent;
            color: transparent;
            caret-color: white;
            z-index: 2;
            resize: none;
            border: none;
            outline: none;
            overflow: hidden;
            width: calc(100% - 17px);
            scrollbar-width: none;
        }

            #c-editor::-webkit-scrollbar {
                display: none;
            }

        /* sits over the scrollbar strip, forwards events to highlight */
        #scrollbar-proxy {
            position: absolute;
            top: 0;
            right: 0;
            width: 17px;
            height: 100%;
            z-index: 3;
            cursor: default;
        }

        #scrollbar-proxy-x {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 17px;
            width: calc(100% - 17px);
            z-index: 3;
            cursor: default;
        }
        /*-------------------------------*/

        .kw {
            color: #569cd6;
        }

        .str {
            color: #ce9178;
        }

        .com {
            color: #6a9955;
        }

        .num {
            color: #b5cea8;
        }

        .diag-error {
            color: #ff5555;
            background: rgba(255, 50, 50, 0.15);
            border-left: 3px solid #ff5555;
            padding: 0 6px;
            border-radius: 2px;
            font-style: italic;
            margin-left: 8px;
        }

        .diag-warning {
            color: #f1c40f;
            background: rgba(241, 196, 15, 0.12);
            border-left: 3px solid #f1c40f;
            padding: 0 6px;
            border-radius: 2px;
            font-style: italic;
            margin-left: 8px;
        }

        .diag-note {
            color: #9cdcfe;
            background: rgba(100, 180, 255, 0.10);
            border-left: 3px solid #9cdcfe;
            padding: 0 6px;
            border-radius: 2px;
            font-style: italic;
            margin-left: 8px;
        }

        #editor-resize-handle {
            height: 6px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-top: none;
            border-radius: 0 0 4px 4px;
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

            #editor-resize-handle::after {
                content: '';
                width: 40px;
                height: 2px;
                background: #555;
                border-radius: 2px;
            }
    </style>
</head>
<body>

    <div class="toolbar">
        <input id="pathInput" type="hidden" value="" />
        <select id="fileList" onchange="onFileSelect()">
            <option value="">-- files --</option>
        </select>

        <!-- ✅ Save moved to top -->
        <button onclick="saveFile()" id="saveBtn" disabled="">Save</button>
        <button onclick="compile()" id="saveCompileBtn">Save &amp; Compile</button>

        <span style="margin-left:6px; border-left:1px solid #bbb; padding-left:6px; display:flex; align-items:center; gap:4px;">
            <button onclick="diagFirst()" title="First diagnostic">&#9651;&#9651; First</button>
            <button onclick="diagPrev()" title="Previous diagnostic (Shift+F8)">&#9650; Prev</button>
            <span id="diagCounter" style="font-size:11px; color:#555; min-width:32px; text-align:center;"></span>
            <button onclick="diagNext()" title="Next diagnostic (F8)">Next &#9660;</button>
            <button onclick="diagLast()" title="Last diagnostic">Last &#9661;&#9661;</button>
        </span>
    </div>

    <div class="editor-wrap">

        <div id="gutter"><div id="gutter-inner">1</div></div>

        <div class="editor-view">
            <pre id="highlight" class="highlight"></pre>

            <!-- ONLY THIS TEXTAREA IS THE EDITOR -->
            <textarea id="c-editor" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"></textarea>

            <!-- transparent proxy so the highlight scrollbar is clickable -->
            <div id="scrollbar-proxy"></div>
            <div id="scrollbar-proxy-x"></div>
        </div>

    </div>
    <div id="editor-resize-handle"></div>

    <pre id="output" class="output"></pre>



    <script src="main.js"></script>


</body>
</html>
