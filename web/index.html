<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Browser</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #fileList {
            min-width: 250px;
        }


        #output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            min-height: 60px;
        }

        .editor-wrap {
            display: flex;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }

        #gutter {
            background: #1e1e1e;
            border-right: 1px solid #333;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            width: 48px;
        }

        #gutter-inner {
            position: absolute;
            top: 0;
            right: 0;
            padding: 10px 8px 10px 4px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
            color: #6e7681;
            text-align: right;
            white-space: pre;
            user-select: none;
        }

        .editor-view {
            position: relative;
            height: 300px;
            flex: 1;
        }

        /* BOTH must match exactly */
        .highlight,
        #c-editor {
            color: transparent; /* hide text */
            caret-color: white; /* keep cursor visible */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre;
            overflow: auto;
            box-sizing: border-box;
        }

        /* background layer - scrollable, scrollbar visible */
        .highlight {
            background: #1e1e1e;
            color: #d4d4d4;
            pointer-events: auto;
            z-index: 2;
            overflow: auto;
            cursor: text;
        }

        /* typing layer - hidden scrollbar, slave to highlight */
        #c-editor {
            background: transparent;
            color: transparent;
            caret-color: white;
            z-index: 1;
            resize: none;
            border: none;
            outline: none;
            overflow: hidden;
            scrollbar-width: none;
        }

            #c-editor::-webkit-scrollbar {
                display: none;
            }
        /*-------------------------------*/

        .kw {
            color: #569cd6;
        }

        .str {
            color: #ce9178;
        }

        .com {
            color: #6a9955;
        }

        .num {
            color: #b5cea8;
        }

        .diag-error {
            color: #ff5555;
            background: rgba(255, 50, 50, 0.15);
            border-left: 3px solid #ff5555;
            padding: 0 6px;
            border-radius: 2px;
            font-style: italic;
            margin-left: 8px;
        }

        .diag-warning {
            color: #f1c40f;
            background: rgba(241, 196, 15, 0.12);
            border-left: 3px solid #f1c40f;
            padding: 0 6px;
            border-radius: 2px;
            font-style: italic;
            margin-left: 8px;
        }

        .diag-note {
            color: #9cdcfe;
            background: rgba(100, 180, 255, 0.10);
            border-left: 3px solid #9cdcfe;
            padding: 0 6px;
            border-radius: 2px;
            font-style: italic;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <input id="pathInput" placeholder="relative path" size="30" />
        <button onclick="loadFiles()">Load</button>

        <select id="fileList" onchange="onFileSelect()">
            <option value="">-- files --</option>
        </select>

        <!-- ✅ Save moved to top -->
        <button onclick="saveFile()" id="saveBtn" disabled="">Save</button>
        <button onclick="compile()" id="saveCompileBtn">Save &amp; Compile</button>
    </div>

    <div class="editor-wrap">

        <div id="gutter"><div id="gutter-inner">1</div></div>

        <div class="editor-view">
            <pre id="highlight" class="highlight"></pre>

            <!-- ONLY THIS TEXTAREA IS THE EDITOR -->
            <textarea id="c-editor"></textarea>
        </div>

    </div>

    <div>
        <div class="output-title">Output</div>
        <pre id="output" class="output"></pre>
    </div>



    <script src="main.js"></script>


</body>
</html>
